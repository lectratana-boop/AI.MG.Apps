<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI.MG - Gestion Mensuelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #1a1a2e; min-height: 100vh; color: white; }
        
        /* Layout principal */
        .app-container { display: flex; height: 100vh; }
        
        /* Sidebar gauche */
        .sidebar {
            width: 80px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 40px;
            color: #a06eff;
        }
        
        .sidebar-icon {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            background: rgba(255,255,255,0.05);
        }
        
        .sidebar-icon:hover, .sidebar-icon.active {
            background: linear-gradient(135deg, #a06eff, #6c3eff);
            transform: scale(1.05);
        }
        
        .sidebar-icon i { font-size: 20px; color: white; }
        
        /* Dropdown sous-catégories */
        .submenu {
            position: absolute;
            left: 70px;
            top: 0;
            background: #16213e;
            border-radius: 15px;
            padding: 10px;
            min-width: 180px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }
        
        .sidebar-icon:hover .submenu { display: block; }
        
        .submenu-item {
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: #ccc;
        }
        
        .submenu-item:hover {
            background: rgba(160, 110, 255, 0.3);
            color: white;
        }
        
        /* Contenu central */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .header h1 { font-size: 28px; font-weight: 600; }
        
        .month-selector {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .month-selector select {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        
        /* Dashboard grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .dashboard-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        
        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(160, 110, 255, 0.2);
        }
        
        .card-title { font-size: 14px; color: #aaa; margin-bottom: 10px; }
        .card-value { font-size: 28px; font-weight: 700; }
        .card-value.positive { color: #4ade80; }
        .card-value.negative { color: #f87171; }
        
        /* Section centrale */
        .center-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        
        .section-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-title { font-size: 18px; font-weight: 600; }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .list-item:hover { background: rgba(255,255,255,0.08); }
        
        .list-item-left { display: flex; align-items: center; gap: 15px; }
        .list-item-icon { 
            width: 40px; height: 40px; 
            background: linear-gradient(135deg, #a06eff, #6c3eff);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        
        .list-item-name { font-weight: 500; }
        .list-item-cat { font-size: 12px; color: #aaa; }
        .list-item-amount { font-weight: 600; }
        
        /* Page facture détaillée */
        .detail-page {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin-top: 25px;
            display: none;
        }
        
        .detail-page.active { display: block; }
        
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        
        .detail-form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 14px; color: #aaa; }
        .form-group input, .form-group select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 16px;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #a06eff;
        }
        
        .save-btn {
            grid-column: span 2;
            background: linear-gradient(135deg, #a06eff, #6c3eff);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .save-btn:hover { transform: scale(1.02); }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 2000;
            font-size: 14px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1500;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .center-section { grid-template-columns: 1fr; }
        }
        
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar-icon { width: 40px; height: 40px; }
            .main-content { padding: 15px; }
            .detail-form { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar gauche -->
        <div class="sidebar">
            <div class="sidebar-logo">MG</div>
            
            <!-- Icône Factures -->
            <div class="sidebar-icon" id="factureIcon">
                <i class="fas fa-file-invoice-dollar"></i>
                <div class="submenu" id="factureSubmenu">
                    <div class="submenu-item" data-cat="Charges fixes">Charges fixes</div>
                    <div class="submenu-item" data-cat="Éducation">Éducation</div>
                    <div class="submenu-item" data-cat="Alimentation">Alimentation</div>
                    <div class="submenu-item" data-cat="Transport">Transport</div>
                    <div class="submenu-item" data-cat="Santé">Santé</div>
                    <div class="submenu-item" data-cat="Shopping">Shopping</div>
                    <div class="submenu-item" data-cat="Imprévus">Imprévus</div>
                </div>
            </div>
            
            <!-- Icône Calendrier -->
            <div class="sidebar-icon" id="calendrierIcon">
                <i class="fas fa-calendar-alt"></i>
            </div>
            
            <!-- Icône Projets -->
            <div class="sidebar-icon" id="projetIcon">
                <i class="fas fa-tasks"></i>
            </div>
            
            <!-- Icône Déconnexion -->
            <div class="sidebar-icon" id="logoutIcon" style="margin-top: auto;">
                <i class="fas fa-sign-out-alt"></i>
            </div>
        </div>
        
        <!-- Contenu principal -->
        <div class="main-content">
            <div class="header">
                <h1 id="pageTitle">Tableau de bord</h1>
                <div class="month-selector">
                    <i class="fas fa-calendar-alt"></i>
                    <select id="monthSelector">
                        <option value="0">Janvier</option>
                        <option value="1">Février</option>
                        <option value="2">Mars</option>
                        <option value="3">Avril</option>
                        <option value="4">Mai</option>
                        <option value="5">Juin</option>
                        <option value="6">Juillet</option>
                        <option value="7">Août</option>
                        <option value="8">Septembre</option>
                        <option value="9">Octobre</option>
                        <option value="10">Novembre</option>
                        <option value="11">Décembre</option>
                    </select>
                </div>
            </div>
            
            <!-- Dashboard -->
            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <div class="card-title">Salaire</div>
                    <div class="card-value positive" id="salaryDisplay">0 Ar</div>
                    <input type="number" id="monthlySalaryInput" placeholder="Montant" style="margin-top: 15px; width: 100%; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.1); border: none; color: white;">
                    <button id="saveSalaryBtn" style="margin-top: 10px; width: 100%; padding: 10px; background: linear-gradient(135deg, #a06eff, #6c3eff); border: none; border-radius: 10px; color: white; cursor: pointer;">Enregistrer</button>
                </div>
                <div class="dashboard-card">
                    <div class="card-title">Épargne</div>
                    <div class="card-value positive" id="savingDisplay">0 Ar</div>
                    <div style="font-size: 12px; color: #aaa; margin-top: 10px;" id="savingDetail"></div>
                </div>
                <div class="dashboard-card">
                    <div class="card-title">Dépenses totales</div>
                    <div class="card-value negative" id="totalExpensesDisplay">0 Ar</div>
                </div>
            </div>
            
            <!-- Section centrale -->
            <div class="center-section">
                <!-- Liste des factures payées -->
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-title">Factures payées</div>
                        <button class="back-btn" onclick="showAllExpenses()">Tout voir</button>
                    </div>
                    <div id="paidExpensesList"></div>
                </div>
                
                <!-- Liste des projets à faire -->
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-title">Projets à faire</div>
                        <button class="back-btn" onclick="showPage('projetPage')">Ajouter</button>
                    </div>
                    <div id="projectsList"></div>
                </div>
            </div>
            
            <!-- Page détaillée facture -->
            <div class="detail-page" id="detailPage">
                <div class="detail-header">
                    <h2 id="detailTitle">Ajouter une dépense</h2>
                    <button class="back-btn" onclick="closeDetailPage()">Retour</button>
                </div>
                <form class="detail-form" id="expenseForm">
                    <div class="form-group">
                        <label>Mois</label>
                        <select id="detailMonth" required>
                            <option value="0">Janvier</option>
                            <option value="1">Février</option>
                            <option value="2">Mars</option>
                            <option value="3">Avril</option>
                            <option value="4">Mai</option>
                            <option value="5">Juin</option>
                            <option value="6">Juillet</option>
                            <option value="7">Août</option>
                            <option value="8">Septembre</option>
                            <option value="9">Octobre</option>
                            <option value="10">Novembre</option>
                            <option value="11">Décembre</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Catégorie</label>
                        <select id="detailCategory" required>
                            <option value="Charges fixes">Charges fixes</option>
                            <option value="Éducation">Éducation</option>
                            <option value="Alimentation">Alimentation</option>
                            <option value="Transport">Transport</option>
                            <option value="Santé">Santé</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Imprévus">Imprévus</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Nom de la dépense</label>
                        <input type="text" id="detailName" placeholder="Ex: Loyer" required>
                    </div>
                    <div class="form-group">
                        <label>Montant (Ar)</label>
                        <input type="number" id="detailAmount" placeholder="Ex: 50000" required>
                    </div>
                    <button type="submit" class="save-btn">Enregistrer la dépense</button>
                </form>
            </div>
            
            <!-- Page calendrier -->
            <div class="detail-page" id="calendrierPage">
                <div class="detail-header">
                    <h2>Calendrier</h2>
                    <button class="back-btn" onclick="closeCalendrierPage()">Retour</button>
                </div>
                <div id="calendarContainer" style="background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px;"></div>
                <div style="margin-top: 25px;">
                    <h3 style="margin-bottom: 15px;">Ajouter un événement</h3>
                    <form id="eventForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <input type="text" id="eventTitle" placeholder="Titre" required>
                        <input type="datetime-local" id="eventDate" required>
                        <textarea id="eventDesc" placeholder="Description" style="grid-column: span 2; padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; resize: vertical;" rows="3"></textarea>
                        <button type="submit" class="save-btn" style="grid-column: span 2;">Ajouter</button>
                    </form>
                </div>
            </div>
            
            <!-- Page projets -->
            <div class="detail-page" id="projetPage">
                <div class="detail-header">
                    <h2>Gestion des projets</h2>
                    <button class="back-btn" onclick="closeProjetPage()">Retour</button>
                </div>
                <form id="projectForm" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px;">
                    <input type="text" id="projectName" placeholder="Nom du projet" required>
                    <select id="projectMonth">
                        <option value="0">Janvier</option><option value="1">Février</option><option value="2">Mars</option><option value="3">Avril</option>
                        <option value="4">Mai</option><option value="5">Juin</option><option value="6">Juillet</option><option value="7">Août</option>
                        <option value="8">Septembre</option><option value="9">Octobre</option><option value="10">Novembre</option><option value="11">Décembre</option>
                    </select>
                    <select id="projectStatus">
                        <option value="en cours">En cours</option>
                        <option value="terminé">Terminé</option>
                    </select>
                    <button type="submit" class="save-btn" style="grid-column: span 3;">Ajouter le projet</button>
                </form>
                <div id="allProjectsList"></div>
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div id="toast" class="toast" style="display: none;"></div>
    
    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 20px;"></h2>
            <div id="modalBody"></div>
            <button class="back-btn" onclick="closeModal()" style="margin-top: 20px; width: 100%;">Fermer</button>
        </div>
    </div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBqcigoEE0rRNkzfYvIRUtH2Vu-BBaCbVg",
            authDomain: "aimg-app.firebaseapp.com",
            projectId: "aimg-app",
            storageBucket: "aimg-app.firebasestorage.app",
            messagingSenderId: "139623135058",
            appId: "1:139623135058:web:407a3a1aabaa5a6780ec8b"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let currentUser = null;
        let currentMonth = new Date().getMonth();
        let calendar = null;
        let currentCategory = "";
        
        // Fonctions utilitaires
        function showToast(msg, isErr = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            toast.style.background = isErr ? '#d9534f' : 'rgba(0,0,0,0.9)';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        function getMonthKey() { return '2025_' + currentMonth; }
        
        function escapeHtml(str) { 
            if(!str) return ''; 
            return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); 
        }
        
        function formatAmount(amount) {
            return amount.toLocaleString() + ' Ar';
        }
        
        // Navigation
        function showPage(pageId) {
            document.querySelectorAll('.detail-page').forEach(p => p.classList.remove('active'));
            document.getElementById('pageTitle').textContent = 'Tableau de bord';
            
            if(pageId === 'calendrierPage') {
                document.getElementById('calendrierPage').classList.add('active');
                document.getElementById('pageTitle').textContent = 'Calendrier';
                initCalendar();
            } else if(pageId === 'projetPage') {
                document.getElementById('projetPage').classList.add('active');
                document.getElementById('pageTitle').textContent = 'Projets';
                loadAllProjects();
            }
        }
        
        function closeDetailPage() {
            document.getElementById('detailPage').classList.remove('active');
            document.getElementById('pageTitle').textContent = 'Tableau de bord';
        }
        
        function closeCalendrierPage() {
            document.getElementById('calendrierPage').classList.remove('active');
            document.getElementById('pageTitle').textContent = 'Tableau de bord';
        }
        
        function closeProjetPage() {
            document.getElementById('projetPage').classList.remove('active');
            document.getElementById('pageTitle').textContent = 'Tableau de bord';
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        // Authentification
        function checkAuth() {
            auth.onAuthStateChanged(async (user) => {
                if(user) {
                    currentUser = user;
                    await loadDashboard();
                    loadPaidExpenses();
                    loadProjects();
                } else {
                    window.location.href = 'login.html'; // Redirection vers page login
                }
            });
        }
        
        // Dashboard
        async function loadDashboard() {
            if(!currentUser) return;
            
            try {
                const doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
                const salary = doc.exists ? (doc.data().salary || 0) : 0;
                const expenses = doc.exists ? (doc.data().expenses || {}) : {};
                
                let totalExpenses = 0;
                for(let cat in expenses) {
                    (expenses[cat] || []).forEach(e => totalExpenses += e.amount || 0);
                }
                
                document.getElementById('salaryDisplay').textContent = formatAmount(salary);
                document.getElementById('savingDisplay').textContent = formatAmount(salary - totalExpenses);
                document.getElementById('totalExpensesDisplay').textContent = formatAmount(totalExpenses);
                document.getElementById('savingDetail').innerHTML = `Salaire: ${formatAmount(salary)}<br>Dépenses: ${formatAmount(totalExpenses)}`;
                document.getElementById('monthlySalaryInput').value = salary;
                document.getElementById('detailMonth').value = currentMonth;
                
            } catch(e) {
                showToast("Erreur chargement", true);
            }
        }
        
        // Factures payées
        async function loadPaidExpenses() {
            if(!currentUser) return;
            
            try {
                const doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
                const expenses = doc.exists ? (doc.data().expenses || {}) : {};
                
                let html = '';
                let count = 0;
                
                for(let cat in expenses) {
                    (expenses[cat] || []).forEach(e => {
                        if(count < 5) { // Limiter à 5 factures
                            html += `
                                <div class="list-item" onclick="editExpense('${cat}', '${e.name}', ${e.amount})">
                                    <div class="list-item-left">
                                        <div class="list-item-icon">
                                            <i class="fas fa-file-invoice-dollar"></i>
                                        </div>
                                        <div>
                                            <div class="list-item-name">${escapeHtml(e.name)}</div>
                                            <div class="list-item-cat">${escapeHtml(cat)}</div>
                                        </div>
                                    </div>
                                    <div class="list-item-amount">${formatAmount(e.amount)}</div>
                                </div>
                            `;
                            count++;
                        }
                    });
                }
                
                if(count === 0) {
                    html = '<div style="text-align: center; color: #aaa; padding: 20px;">Aucune facture payée</div>';
                }
                
                document.getElementById('paidExpensesList').innerHTML = html;
                
            } catch(e) {
                showToast("Erreur chargement", true);
            }
        }
        
        // Projets
        async function loadProjects() {
            if(!currentUser) return;
            
            try {
                const doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
                const projects = doc.exists ? (doc.data().projects || []) : [];
                
                let html = '';
                let count = 0;
                
                projects.forEach(p => {
                    if(count < 5 && p.status === 'en cours') {
                        html += `
                            <div class="list-item" onclick="toggleProject(${p.id})">
                                <div class="list-item-left">
                                    <div class="list-item-icon">
                                        <i class="fas fa-tasks"></i>
                                    </div>
                                    <div>
                                        <div class="list-item-name">${escapeHtml(p.name)}</div>
                                        <div class="list-item-cat">En cours</div>
                                    </div>
                                </div>
                                <div style="color: #fbbf24;">
                                    <i class="fas fa-clock"></i>
                                </div>
                            </div>
                        `;
                        count++;
                    }
                });
                
                if(count === 0) {
                    html = '<div style="text-align: center; color: #aaa; padding: 20px;">Aucun projet en cours</div>';
                }
                
                document.getElementById('projectsList').innerHTML = html;
                
            } catch(e) {
                showToast("Erreur chargement", true);
            }
        }
        
        async function loadAllProjects() {
            if(!currentUser) return;
            
            try {
                const doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
                const projects = doc.exists ? (doc.data().projects || []) : [];
                
                let html = '';
                const monthNames = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
                
                projects.forEach(p => {
                    html += `
                        <div class="list-item" onclick="toggleProject(${p.id})">
                            <div class="list-item-left">
                                <div class="list-item-icon">
                                    <i class="fas fa-tasks"></i>
                                </div>
                                <div>
                                    <div class="list-item-name">${escapeHtml(p.name)}</div>
                                    <div class="list-item-cat">${monthNames[p.month]} - ${p.status}</div>
                                </div>
                            </div>
                            <div style="color: ${p.status === 'en cours' ? '#fbbf24' : '#4ade80'};">
                                <i class="fas ${p.status === 'en cours' ? 'fa-clock' : 'fa-check'}"></i>
                            </div>
                        </div>
                    `;
                });
                
                if(projects.length === 0) {
                    html = '<div style="text-align: center; color: #aaa; padding: 20px;">Aucun projet</div>';
                }
                
                document.getElementById('allProjectsList').innerHTML = html;
                
            } catch(e) {
                showToast("Erreur chargement", true);
            }
        }
        
        // Événements
        document.getElementById('factureIcon').addEventListener('click', function(e) {
            if(!e.target.closest('.submenu')) {
                // Ouvrir page facture avec toutes les dépenses
                loadAllExpenses();
            }
        });
        
        document.querySelectorAll('.submenu-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation();
                currentCategory = this.dataset.cat;
                openDetailPage(currentCategory);
            });
        });
        
        document.getElementById('calendrierIcon').addEventListener('click', () => showPage('calendrierPage'));
        document.getElementById('projetIcon').addEventListener('click', () => showPage('projetPage'));
        document.getElementById('logoutIcon').addEventListener('click', async () => {
            await auth.signOut();
            showToast("Déconnecté");
            window.location.href = 'login.html';
        });
        
        function openDetailPage(category = '') {
            document.getElementById('detailPage').classList.add('active');
            document.getElementById('pageTitle').textContent = 'Ajouter une dépense';
            document.getElementById('detailCategory').value = category || 'Charges fixes';
            document.getElementById('detailMonth').value = currentMonth;
        }
        
        function showAllExpenses() {
            openDetailPage();
        }
        
        function editExpense(category, name, amount) {
            openDetailPage(category);
            document.getElementById('detailName').value = name;
            document.getElementById('detailAmount').value = amount;
        }
        
        // Formulaires
        document.getElementById('saveSalaryBtn').addEventListener('click', async () => {
            if(!currentUser) return;
            
            try {
                const salary = parseFloat(document.getElementById('monthlySalaryInput').value) || 0;
                await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).set({ salary }, { merge: true });
                showToast("Salaire enregistré");
                loadDashboard();
            } catch(e) {
                showToast("Erreur", true);
            }
        });
        
        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if(!currentUser) return;
            
            const category = document.getElementById('detailCategory').value;
            const name = document.getElementById('detailName').value.trim();
            const amount = parseFloat(document.getElementById('detailAmount').value);
            const month = parseInt(document.getElementById('detailMonth').value);
            
            if(!name || !amount) {
                showToast("Nom et montant requis", true);
                return;
            }
            
            try {
                const monthKey = '2025_' + month;
                const doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(monthKey).get();
                const expenses = doc.exists ? (doc.data().expenses || {}) : {};
                
                if(!expenses[category]) expenses[category] = [];
                expenses[category].push({ name, amount });
                
                await db.collection('users').doc(currentUser.uid).collection('months').doc(monthKey).set({ expenses }, { merge: true });
                
                document.getElementById('detailName').value = '';
                document.getElementById('detailAmount').value = '';
                
                showToast("Dépense enregistrée");
                closeDetailPage();
                loadDashboard();
                loadPaidExpenses();
                
            } catch(e) {
                showToast("Erreur", true);
            }
        });
        
        document.getElementById('eventForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if(!currentUser) return;
            
            const title = document.getElementById('eventTitle').value.trim();
            const date = document.getElementById('eventDate').value;
            
            if(!title || !date) {
                showToast("Titre et date requis", true);
                return;
            }
            
            try {
                const doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
                const events = doc.exists ? (doc.data().events || []) : [];
                
                events.push({ title, date });
                await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).set({ events }, { merge: true });
                
                document.getElementById('eventTitle').value = '';
                document.getElementById('eventDate').value = '';
                
                showToast("Événement ajouté");
                initCalendar();
                
            } catch(e) {
                showToast("Erreur", true);
            }
        });
        
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if(!currentUser) return;
            
            const name = document.getElementById('projectName').value.trim();
            const month = parseInt(document.getElementById('projectMonth').value);
            const status = document.getElementById('projectStatus').value;
            
            if(!name) {
                showToast("Nom requis", true);
                return;
            }
            
            try {
                const doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
                const projects = doc.exists ? (doc.data().projects || []) : [];
                
                if(projects.filter(p => p.month === month).length >= 10) {
                    return showToast("Max 10 projets par mois", true);
                }
                
                projects.push({ id: Date.now(), name, month, status });
                await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).set({ projects }, { merge: true });
                
                document.getElementById('projectName').value = '';
                
                showToast("Projet ajouté");
                loadAllProjects();
                loadProjects();
                
            } catch(e) {
                showToast("Erreur", true);
            }
        });
        
        // Calendrier
        async function initCalendar() {
            if(!currentUser) return;
            
            try {
                const doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
                const events = doc.exists ? (doc.data().events || []) : [];
                const calEl = document.getElementById('calendarContainer');
                
                if(calendar) calendar.destroy();
                
                calendar = new FullCalendar.Calendar(calEl, {
                    initialView: 'dayGridMonth',
                    events: events.map(e => ({ title: e.title, start: e.date })),
                    height: 'auto',
                    locale: 'fr'
                });
                calendar.render();
            } catch(e) {
                console.error("Erreur calendrier:", e);
            }
        }
        
        // Gestion projets
        async function toggleProject(id) {
            if(!currentUser) return;
            
            try {
                const doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
                const projects = doc.exists ? (doc.data().projects || []) : [];
                
                const project = projects.find(p => p.id === id);
                if(project) {
                    project.status = project.status === 'en cours' ? 'terminé' : 'en cours';
                    await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).set({ projects }, { merge: true });
                    showToast("Statut mis à jour");
                    loadProjects();
                    loadAllProjects();
                }
            } catch(e) {
                showToast("Erreur", true);
            }
        }
        
        // Mois
        document.getElementById('monthSelector').addEventListener('change', (e) => {
            currentMonth = parseInt(e.target.value);
            loadDashboard();
            loadPaidExpenses();
            loadProjects();
        });
        
        // Initialisation
        checkAuth();
    </script>
</body>
</html>
