<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Vie - 3D Fintech App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #050505;
            color: #e2e8f0;
            overflow: hidden;
        }

        .glass {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .neo-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .neo-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            outline: none;
        }

        .glow-releve {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
        }

        .sidebar-item { transition: all 0.2s; }
        .sidebar-item.active {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.2) 0%, transparent 100%);
            border-left: 4px solid #6366f1;
            color: #fff;
        }

        /* Animation de notification */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .alert-active { animation: pulse-red 2s infinite; }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <template x-if="!isLoggedIn">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-[#050505] p-4">
            <div class="glass p-8 rounded-[2rem] w-full max-w-sm text-center border-t border-white/20">
                <div class="mb-6 flex justify-center">
                    <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-indigo-500/40 rotate-12">
                        <i data-lucide="heart" class="text-white w-8 h-8"></i>
                    </div>
                </div>
                <h1 class="text-3xl font-bold mb-2">Ma Vie</h1>
                <p class="text-gray-400 mb-8 text-sm">Gestion intelligente 3D</p>
                
                <div class="space-y-4">
                    <input type="email" x-model="loginForm.email" placeholder="email@example.com" class="neo-input w-full p-4 rounded-xl">
                    <input type="password" x-model="loginForm.pass" placeholder="password" class="neo-input w-full p-4 rounded-xl">
                    <button @click="login()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold shadow-lg transition-transform active:scale-95">
                        Démarrer l'expérience
                    </button>
                    <p x-show="error" class="text-red-500 text-xs mt-2" x-text="error"></p>
                </div>
            </div>
        </div>
    </template>

    <div class="flex h-screen w-full p-2 md:p-4 gap-4" x-show="isLoggedIn">
        
        <aside class="w-20 md:w-72 glass rounded-[2.5rem] flex flex-col p-4 py-8 overflow-hidden">
            <div class="hidden md:flex items-center gap-3 px-4 mb-10">
                <div class="w-8 h-8 bg-indigo-500 rounded-lg"></div>
                <span class="font-bold text-xl tracking-widest">MA VIE</span>
            </div>

            <nav class="flex-1 space-y-2 overflow-y-auto">
                <template x-for="item in menu">
                    <button @click="activeTab = item.id" 
                            :class="activeTab === item.id ? 'active' : 'text-gray-500'"
                            class="sidebar-item w-full flex items-center gap-4 p-4 rounded-xl hover:bg-white/5">
                        <i :data-lucide="item.icon" class="w-6 h-6"></i>
                        <span class="hidden md:block font-medium text-sm" x-text="item.label"></span>
                    </button>
                </template>
            </nav>

            <button @click="logout()" class="p-4 text-red-400 hover:bg-red-500/10 rounded-xl flex items-center gap-4 mt-auto">
                <i data-lucide="log-out" class="w-6 h-6"></i>
                <span class="hidden md:block">Quitter</span>
            </button>
        </aside>

        <main class="flex-1 glass rounded-[2.5rem] p-6 md:p-10 overflow-y-auto relative">
            
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl md:text-4xl font-bold capitalize" x-text="menu.find(m => m.id === activeTab).label"></h2>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest">Solde Portefeuille</p>
                        <p class="text-xl font-bold text-indigo-400" x-text="format(calculatePortefeuille())"></p>
                    </div>
                </div>
            </div>

            <div x-show="activeTab === 'jirama'" class="space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass p-6 rounded-3xl">
                        <h3 class="mb-4 flex items-center gap-2 font-semibold">
                            <i data-lucide="calendar" class="text-indigo-400"></i> Calendrier de consommation (kWh)
                        </h3>
                        <div class="grid grid-cols-7 gap-2">
                            <template x-for="day in 31">
                                <div :class="(day >= 25 && day <= 30) ? 'glow-releve' : ''" class="neo-input p-2 rounded-xl text-center">
                                    <span class="text-[10px] block mb-1" x-text="day"></span>
                                    <input type="number" x-model.number="db.jirama[day]" class="bg-transparent w-full text-center text-xs focus:outline-none">
                                </div>
                            </template>
                        </div>
                    </div>
                    <div class="flex flex-col gap-6">
                        <div :class="jiramaAlert() ? 'alert-active bg-red-500/20 border-red-500' : 'opacity-50'" class="glass p-8 rounded-3xl transition-all">
                            <i data-lucide="zap-off" :class="jiramaAlert() ? 'text-red-500' : 'text-gray-600'" class="w-12 h-12 mb-4"></i>
                            <h4 class="text-xl font-bold">Alerte Surconsommation</h4>
                            <p class="text-sm text-gray-400">Alerte si > 2.5kWh entre 2 jours.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div x-show="activeTab === 'ecolage'" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <template x-for="m in mois">
                    <div class="glass p-6 rounded-3xl flex flex-col items-center gap-4">
                        <span class="font-bold capitalize" x-text="m"></span>
                        <button @click="db.ecolage[m] = !db.ecolage[m]" 
                                :class="db.ecolage[m] ? 'bg-green-500' : 'bg-red-500/20 text-red-500'"
                                class="w-full py-2 rounded-xl text-xs font-bold transition">
                            <span x-text="db.ecolage[m] ? 'PAYÉ' : 'À PAYER'"></span>
                        </button>
                    </div>
                </template>
            </div>

            <div x-show="['shopping', 'medical', 'adidy'].includes(activeTab)" class="max-w-2xl mx-auto space-y-3">
                <template x-for="m in mois">
                    <div class="glass p-4 rounded-2xl flex items-center justify-between">
                        <span class="capitalize font-medium" x-text="m"></span>
                        <input type="number" x-model.number="db[activeTab][m]" placeholder="0.00 Ar" 
                               class="neo-input p-2 rounded-lg text-right w-40">
                    </div>
                </template>
            </div>

            <div x-show="activeTab === 'portefeuille'" class="space-y-8">
                <div class="bg-indigo-600 p-8 rounded-[2rem] shadow-2xl shadow-indigo-500/20">
                    <p class="text-indigo-200 text-sm mb-1 uppercase tracking-tighter">Votre Salaire Mensuel</p>
                    <input type="number" x-model.number="db.salaire" class="bg-transparent text-4xl md:text-6xl font-bold text-white focus:outline-none w-full">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass p-6 rounded-3xl">
                        <p class="text-gray-400 text-xs mb-4">RÉCAPITULATIF DES DÉPENSES</p>
                        <ul class="space-y-4">
                            <li class="flex justify-between"><span>Jirama (Total kWh x 500)</span> <span class="text-red-400" x-text="'- ' + format(totalJirama())"></span></li>
                            <li class="flex justify-between"><span>Shopping</span> <span class="text-red-400" x-text="'- ' + format(db.shopping[currentMonth] || 0)"></span></li>
                            <li class="flex justify-between"><span>Medical</span> <span class="text-red-400" x-text="'- ' + format(db.medical[currentMonth] || 0)"></span></li>
                            <li class="flex justify-between"><span>ADIDY</span> <span class="text-red-400" x-text="'- ' + format(db.adidy[currentMonth] || 0)"></span></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div x-show="activeTab === 'epargne'" class="flex flex-col items-center justify-center py-20">
                <div class="relative">
                    <div class="w-64 h-64 rounded-full border-4 border-dashed border-indigo-500/30 flex items-center justify-center animate-[spin_20s_linear_infinite]"></div>
                    <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
                        <i data-lucide="piggy-bank" class="w-12 h-12 text-indigo-400 mb-2"></i>
                        <h3 class="text-4xl font-bold glow-text" x-text="format(calculateEpargne())"></h3>
                        <p class="text-gray-400 text-sm">Épargne Totale</p>
                    </div>
                </div>
            </div>

            <div x-show="activeTab === 'objectif'" class="space-y-6">
                <h3 class="font-bold text-xl mb-4">Gains Journaliers</h3>
                <div class="grid grid-cols-4 md:grid-cols-7 gap-3">
                    <template x-for="day in 31">
                        <div class="neo-input p-3 rounded-2xl flex flex-col items-center">
                            <span class="text-[10px] text-gray-500" x-text="'Jour '+day"></span>
                            <input type="number" x-model.number="db.gains[day]" class="bg-transparent w-full text-center font-bold text-green-400 focus:outline-none">
                        </div>
                    </template>
                </div>
            </div>

        </main>
    </div>

    <script>
        function app() {
            return {
                isLoggedIn: false,
                activeTab: 'portefeuille',
                error: '',
                loginForm: { email: '', pass: '' },
                currentMonth: 'avril',
                mois: ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'],
                menu: [
                    { id: 'portefeuille', label: 'Portefeuille', icon: 'wallet' },
                    { id: 'jirama', label: 'Jirama', icon: 'zap' },
                    { id: 'ecolage', label: 'Écolage', icon: 'graduation-cap' },
                    { id: 'shopping', label: 'Shopping', icon: 'shopping-cart' },
                    { id: 'medical', label: 'Médical', icon: 'heart-pulse' },
                    { id: 'adidy', label: 'ADIDY', icon: 'gift' },
                    { id: 'epargne', label: 'Épargne', icon: 'trending-up' },
                    { id: 'objectif', label: 'Objectifs', icon: 'target' },
                ],
                db: {
                    salaire: 0,
                    jirama: {},
                    ecolage: {},
                    shopping: {},
                    medical: {},
                    adidy: {},
                    gains: {}
                },

                init() {
                    const saved = localStorage.getItem('mavie_db');
                    if (saved) this.db = JSON.parse(saved);
                    lucide.createIcons();
                    this.$watch('db', val => localStorage.setItem('mavie_db', JSON.stringify(val)), { deep: true });
                },

                login() {
                    if (this.loginForm.email === 'lectratana@gmail.com' && this.loginForm.pass === 'andy2050@@') {
                        this.isLoggedIn = true;
                        this.error = '';
                        setTimeout(() => lucide.createIcons(), 50);
                    } else {
                        this.error = 'Identifiants incorrects.';
                    }
                },

                logout() { this.isLoggedIn = false; },

                totalJirama() {
                    // Simulation : 1kWh = 500 Ar (à ajuster selon vos besoins)
                    let totalKwh = Object.values(this.db.jirama).reduce((a, b) => a + (parseFloat(b) || 0), 0);
                    return totalKwh * 500; 
                },

                jiramaAlert() {
                    const days = Object.keys(this.db.jirama).sort((a,b) => a-b);
                    for (let i = 1; i < days.length; i++) {
                        let diff = Math.abs(this.db.jirama[days[i]] - this.db.jirama[days[i-1]]);
                        if (diff > 2.5) return true;
                    }
                    return false;
                },

                calculatePortefeuille() {
                    let m = this.currentMonth;
                    let depenses = this.totalJirama() + 
                                  (parseFloat(this.db.shopping[m]) || 0) + 
                                  (parseFloat(this.db.medical[m]) || 0) + 
                                  (parseFloat(this.db.adidy[m]) || 0);
                    // On peut ajouter l'écolage ici si payé (logique simplifiée)
                    return this.db.salaire - depenses;
                },

                calculateEpargne() {
                    let totalGains = Object.values(this.db.gains).reduce((a, b) => a + (parseFloat(b) || 0), 0);
                    return this.calculatePortefeuille() + totalGains;
                },

                format(val) {
                    return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'MGA', maximumFractionDigits: 0 }).format(val);
                }
            }
        }
    </script>
</body>
</html>
