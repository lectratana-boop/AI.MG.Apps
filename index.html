<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Vie 3D - Multi-Utilisateurs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #08080a; color: #f1f5f9; overflow: hidden; }
        .glass { background: rgba(18, 18, 22, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-compact { width: 70px; transition: width 0.3s ease; }
        @media (min-width: 1024px) { .sidebar-compact { width: 240px; } }
        .nav-btn.active { background: rgba(99, 102, 241, 0.1); color: #818cf8; border-right: 3px solid #6366f1; }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <template x-if="!isLoggedIn">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-[#08080a] p-6">
            <div class="glass p-8 rounded-[2rem] w-full max-w-[380px] border border-white/10 shadow-2xl text-center">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg">
                    <i data-lucide="shield-check" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold mb-8">Ma Vie 3D</h1>
                <div class="space-y-4">
                    <input type="email" x-model="loginData.email" placeholder="Email" 
                           class="w-full bg-black/40 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-indigo-500 text-sm">
                    <input type="password" x-model="loginData.pass" placeholder="Mot de passe" 
                           class="w-full bg-black/40 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-indigo-500 text-sm">
                    <button @click="handleLogin" 
                            class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition-all active:scale-95 shadow-lg shadow-indigo-600/20">
                        Se connecter
                    </button>
                    <p x-show="errorMessage" x-text="errorMessage" class="text-red-400 text-xs mt-2"></p>
                </div>
            </div>
        </div>
    </template>

    <div class="flex h-screen w-full overflow-hidden" x-show="isLoggedIn" x-cloak>
        <aside class="sidebar-compact glass h-full flex flex-col items-center lg:items-start py-8 border-r border-white/5">
            <div class="px-6 mb-12 flex items-center gap-3">
                <div class="min-w-[40px] h-10 bg-indigo-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="heart" class="text-white w-5 h-5"></i>
                </div>
                <span class="hidden lg:block font-bold text-lg">MA VIE</span>
            </div>
            <nav class="w-full flex-1 space-y-1 overflow-y-auto">
                <template x-for="item in menu">
                    <button @click="tab = item.id" :class="tab === item.id ? 'active' : ''"
                            class="nav-btn w-full flex items-center px-6 py-4 hover:text-white transition-colors group">
                        <i :data-lucide="item.icon" class="w-5 h-5"></i>
                        <span class="hidden lg:block ml-4 text-sm font-medium" x-text="item.label"></span>
                    </button>
                </template>
            </nav>
            <button @click="handleLogout" class="px-6 py-4 text-gray-500 hover:text-red-400 w-full flex items-center">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                <span class="hidden lg:block ml-4 text-sm font-medium">Déconnexion</span>
            </button>
        </aside>

        <main class="flex-1 h-full overflow-y-auto p-4 lg:p-10 bg-gradient-to-br from-[#08080a] to-[#0c0c10]">
            <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-6 mb-12">
                <div>
                    <h2 class="text-3xl lg:text-4xl font-bold" x-text="menu.find(m => m.id === tab).label"></h2>
                    <p class="text-gray-500 text-sm mt-1">Utilisateur : <span class="text-indigo-400" x-text="loginData.email"></span></p>
                </div>
                <div class="flex items-center gap-4">
                    <select x-model="currentMonth" class="bg-indigo-600 text-white p-3 rounded-xl font-bold outline-none">
                        <template x-for="m in months"><option :value="m" x-text="m" class="capitalize"></option></template>
                    </select>
                    <div class="glass p-4 rounded-2xl flex items-center gap-4 px-6 border border-indigo-500/20">
                        <div class="text-right">
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Net <span x-text="currentMonth"></span></p>
                            <p class="text-xl font-bold text-indigo-400" x-text="formatAr(calcWallet(currentMonth))"></p>
                        </div>
                        <i data-lucide="wallet" class="text-indigo-500"></i>
                    </div>
                </div>
            </div>

            <div x-show="tab === 'portefeuille'" class="max-w-3xl mx-auto glass p-8 rounded-[2.5rem]">
                <label class="text-xs uppercase text-gray-500 tracking-widest">Mon Salaire Mensuel</label>
                <div class="flex items-center gap-4 mt-2">
                    <input type="number" x-model.number="db.salary" class="bg-transparent text-5xl font-black text-white focus:outline-none w-full">
                    <span class="text-2xl font-bold text-gray-700">Ar</span>
                </div>
                <div class="mt-12 space-y-3">
                    <template x-for="cat in expenseCategories">
                        <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl">
                            <span class="text-sm capitalize" x-text="cat"></span>
                            <span class="text-red-400 font-bold" x-text="'- ' + formatAr(getMonthExpense(cat, currentMonth))"></span>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="expenseCategories.concat(['epargne']).includes(tab)" class="max-w-2xl mx-auto space-y-3">
                <template x-for="m in months">
                    <div class="glass p-4 rounded-2xl flex items-center justify-between border-l-4 border-transparent hover:border-indigo-500 transition-all">
                        <span class="capitalize font-medium text-gray-300" x-text="m"></span>
                        <div class="flex items-center gap-3">
                            <input type="number" x-model.number="tab === 'epargne' ? db.gains[m] : db[tab][m]" 
                                   class="bg-black/40 p-3 rounded-xl text-right w-40 focus:border-indigo-500 border border-white/5">
                            <span class="text-xs text-gray-600 font-bold" x-text="tab === 'jirama' ? 'kW' : 'Ar'"></span>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURATION FIREBASE (Inchangée)
        var firebaseConfig = {
            apiKey: "AIzaSyBY_zHJAaNLtXDBlD1TYMzALlMlMHNBwWk",
            authDomain: "aiza-38b31.firebaseapp.com",
            databaseURL: "https://aiza-38b31-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "aiza-38b31",
            storageBucket: "aiza-38b31.firebasestorage.app",
            messagingSenderId: "850157491678",
            appId: "1:850157491678:web:614b2b70b934cf09fcb94f"
        };
        firebase.initializeApp(firebaseConfig);

        function app() {
            return {
                isLoggedIn: false,
                errorMessage: '',
                tab: 'portefeuille',
                currentMonth: 'avril',
                loginData: { email: '', pass: '' },
                months: ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'],
                expenseCategories: ['jirama', 'ecolage', 'shopping', 'medical', 'adidy', 'loyer', 'lessive', 'frais', 'repas', 'autres'],
                menu: [
                    { id: 'portefeuille', label: 'Portefeuille', icon: 'wallet' },
                    { id: 'jirama', label: 'Jirama', icon: 'zap' },
                    { id: 'ecolage', label: 'Écolage', icon: 'graduation-cap' },
                    { id: 'shopping', label: 'Shopping', icon: 'shopping-cart' },
                    { id: 'medical', label: 'Médical', icon: 'heart-pulse' },
                    { id: 'adidy', label: 'ADIDY', icon: 'gift' },
                    { id: 'loyer', label: 'Loyer', icon: 'home' },
                    { id: 'lessive', label: 'Lessive', icon: 'droplet' },
                    { id: 'frais', label: 'Frais', icon: 'file-text' },
                    { id: 'repas', label: 'Repas', icon: 'utensils' },
                    { id: 'autres', label: 'Autres', icon: 'more-horizontal' },
                    { id: 'epargne', label: 'Épargne', icon: 'landmark' }
                ],
                db: { salary: 0, jirama: {}, ecolage: {}, shopping: {}, medical: {}, adidy: {}, loyer: {}, lessive: {}, frais: {}, repas: {}, autres: {}, gains: {}, targets: {} },
                
                init() {
                    lucide.createIcons();
                },

                // 3. CLOISONNEMENT DES DONNÉES (SÉPARÉ DE AIZA_DATA)
                syncData(uid) {
                    const userRef = firebase.database().ref('mavie_data/users/' + uid);
                    userRef.on('value', (snapshot) => {
                        if (snapshot.exists()) {
                            this.db = snapshot.val();
                        } else {
                            // Initialisation automatique du dossier utilisateur
                            userRef.set(this.db);
                        }
                        setTimeout(() => lucide.createIcons(), 100);
                    });

                    this.$watch('db', val => { if(this.isLoggedIn) userRef.set(JSON.parse(JSON.stringify(val))); }, { deep: true });
                },

                handleLogin() {
                    this.errorMessage = '';
                    firebase.auth().signInWithEmailAndPassword(this.loginData.email, this.loginData.pass)
                        .then((userCredential) => {
                            this.isLoggedIn = true;
                            this.syncData(userCredential.user.uid);
                            setTimeout(() => lucide.createIcons(), 100);
                        })
                        .catch((error) => {
                            this.errorMessage = "Identifiants invalides ou erreur Firebase.";
                            console.error(error);
                        });
                },

                handleLogout() {
                    firebase.auth().signOut().then(() => {
                        this.isLoggedIn = false;
                        location.reload();
                    });
                },

                getMonthExpense(cat, m) {
                    if (cat === 'jirama') return (Number(this.db.jirama?.[m]) || 0) * 130;
                    return Number(this.db[cat]?.[m]) || 0;
                },

                getTotalExpenses(m) {
                    return this.expenseCategories.reduce((t, c) => t + this.getMonthExpense(c, m), 0);
                },

                calcWallet(m) {
                    return (Number(this.db.salary) || 0) - this.getTotalExpenses(m);
                },

                formatAr(v) { return new Intl.NumberFormat('fr-FR').format(v || 0) + ' Ar'; }
            }
        }
    </script>
</body>
</html>
