<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI.MG - Gestion Personnelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at 10% 30%, #1a1a2e, #0f0f1a); min-height: 100vh; padding: 16px; }
        .app-container { max-width: 550px; margin: 0 auto; background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); border-radius: 48px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        .page { display: none; padding: 20px 18px; }
        .active-page { display: block; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 32px; padding: 30px 24px; border: 1px solid rgba(255,255,255,0.2); }
        .gradient-btn { background: linear-gradient(135deg, #a06eff, #6c3eff); border: none; color: white; padding: 14px 20px; border-radius: 60px; font-weight: 600; cursor: pointer; font-size: 16px; width: 100%; margin-bottom: 12px; }
        .gradient-btn-secondary { background: linear-gradient(135deg, #3a86ff, #2666cc); }
        .gradient-btn-danger { background: #d9534f; }
        input { background: rgba(255,255,255,0.9); border: none; border-radius: 60px; padding: 14px 18px; width: 100%; margin-bottom: 14px; font-size: 16px; }
        .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #f0e6ff, #c7b9ff); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; margin-bottom: 20px; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; padding: 12px 24px; border-radius: 40px; z-index: 1000; animation: fadeOut 3s ease forwards; font-size: 14px; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .link-btn { background: none; border: none; color: #c7b9ff; cursor: pointer; margin-top: 10px; font-size: 14px; text-align: center; width: 100%; }
        h2 { color: white; text-align: center; margin-bottom: 25px; font-size: 24px; }
        p { color: #ccc; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>
<div class="app-container">
    <!-- PAGE LOGIN -->
    <div id="loginPage" class="page active-page">
        <div class="card">
            <div class="logo">AI.MG</div>
            <h2>Connexion</h2>
            <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
            <input type="password" id="loginPassword" placeholder="Mot de passe" autocomplete="current-password">
            <button id="signinBtn" class="gradient-btn">Se connecter</button>
            <button id="showRegisterBtn" class="gradient-btn gradient-btn-secondary">Créer un compte</button>
            <button id="forgotPwdBtn" class="link-btn">Mot de passe oublié ?</button>
            <div id="loginMessage" style="margin-top: 15px; text-align: center; color: #ffb4a2; font-size: 14px;"></div>
        </div>
    </div>

    <!-- PAGE INSCRIPTION -->
    <div id="registerPage" class="page">
        <div class="card">
            <div class="logo">AI.MG</div>
            <h2>Inscription</h2>
            <input type="email" id="regEmail" placeholder="Email" autocomplete="email">
            <input type="password" id="regPassword" placeholder="Mot de passe (min 6 caractères)" autocomplete="new-password">
            <input type="tel" id="regPhone" placeholder="Téléphone (+261...)" autocomplete="tel">
            <button id="registerBtn" class="gradient-btn">S'inscrire</button>
            <button id="showLoginBtn" class="gradient-btn gradient-btn-secondary">Retour à la connexion</button>
            <div id="registerMessage" style="margin-top: 15px; text-align: center; color: #ffb4a2; font-size: 14px;"></div>
        </div>
    </div>

    <!-- PAGE VÉRIFICATION EMAIL -->
    <div id="verifyPage" class="page">
        <div class="card" style="text-align: center;">
            <i class="fas fa-envelope" style="font-size: 60px; color: #ffd966; margin-bottom: 20px;"></i>
            <h2>Vérifiez votre email</h2>
            <p>Un email a été envoyé à <strong id="verifyEmailSpan"></strong></p>
            <p>Cliquez sur le lien dans l'email pour activer votre compte.</p>
            <button id="resendVerifyBtn" class="gradient-btn">Renvoyer l'email</button>
            <button id="logoutFromVerifyBtn" class="gradient-btn gradient-btn-danger">Retour à la connexion</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardPage" class="page">
        <div class="card">
            <div class="logo" style="margin-bottom: 20px;">AI.MG</div>
            <h2>✅ Connexion réussie !</h2>
            <p>Bienvenue <strong id="userEmailDisplay"></strong></p>
            <p>Votre compte est vérifié et prêt à être utilisé.</p>
            <button id="logoutBtn" class="gradient-btn gradient-btn-danger" style="margin-top: 20px;">Déconnexion</button>
        </div>
    </div>
</div>

<script>
    // ==================== FIREBASE CONFIGURATION ====================
    // METTEZ VOTRE NOUVELLE CLÉ API ICI
    const firebaseConfig = {
        apiKey: "AIzaSyBgjkrFJjhgt3zFJg90j1NymbG6s2AQRC0",
        authDomain: "aimg-app.firebaseapp.com",
        projectId: "aimg-app",
        storageBucket: "aimg-app.firebasestorage.app",
        messagingSenderId:  "139623135058",
        appId: "1:139623135058:web:407a3a1aabaa5a6780ec8b"
    };
    
    // Initialisation
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // Persistance locale
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    
    // Fonction toast
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? 'rgba(220,53,69,0.95)' : 'rgba(0,0,0,0.85)';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
    }
    
    // Navigation entre pages
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
    }
    
    // INSCRIPTION
    async function register() {
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const phone = document.getElementById('regPhone').value.trim();
        const msgDiv = document.getElementById('registerMessage');
        
        msgDiv.innerHTML = '';
        
        if (!email || !password) {
            msgDiv.innerHTML = "❌ Email et mot de passe requis";
            return;
        }
        if (password.length < 6) {
            msgDiv.innerHTML = "❌ Mot de passe minimum 6 caractères";
            return;
        }
        
        msgDiv.innerHTML = "⏳ Création du compte en cours...";
        
        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, password);
            const user = userCred.user;
            
            if (phone) {
                await user.updateProfile({ phoneNumber: phone });
            }
            
            await user.sendEmailVerification();
            
            await db.collection('users').doc(user.uid).set({
                email: email,
                phoneNumber: phone,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                emailVerified: false
            });
            
            msgDiv.innerHTML = "✅ Compte créé ! Un email de vérification a été envoyé.";
            showToast("Compte créé ! Vérifiez votre email");
            
            await auth.signOut();
            document.getElementById('verifyEmailSpan').textContent = email;
            showPage('verifyPage');
            
        } catch(e) {
            let msg = e.message;
            if (msg.includes('email-already-in-use')) msg = "Cet email est déjà utilisé";
            if (msg.includes('invalid-email')) msg = "Email invalide";
            if (msg.includes('weak-password')) msg = "Mot de passe trop faible (min 6 caractères)";
            msgDiv.innerHTML = "❌ " + msg;
            showToast(msg, true);
        }
    }
    
    // CONNEXION
    async function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const msgDiv = document.getElementById('loginMessage');
        
        msgDiv.innerHTML = '';
        
        if (!email || !password) {
            msgDiv.innerHTML = "❌ Email et mot de passe requis";
            return;
        }
        
        msgDiv.innerHTML = "⏳ Connexion en cours...";
        
        try {
            const userCred = await auth.signInWithEmailAndPassword(email, password);
            const user = userCred.user;
            
            await user.reload();
            
            if (!user.emailVerified) {
                await auth.signOut();
                document.getElementById('verifyEmailSpan').textContent = email;
                showPage('verifyPage');
                msgDiv.innerHTML = "❌ Veuillez vérifier votre email avant de vous connecter";
                return;
            }
            
            await db.collection('users').doc(user.uid).update({
                emailVerified: true,
                lastLogin: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            document.getElementById('userEmailDisplay').textContent = user.email;
            showToast("Connexion réussie !");
            showPage('dashboardPage');
            
        } catch(e) {
            let msg = e.message;
            if (msg.includes('user-not-found')) msg = "Aucun compte trouvé avec cet email";
            else if (msg.includes('wrong-password')) msg = "Mot de passe incorrect";
            else if (msg.includes('invalid-email')) msg = "Email invalide";
            msgDiv.innerHTML = "❌ " + msg;
            showToast(msg, true);
        }
    }
    
    // Mot de passe oublié
    async function resetPassword() {
        const email = prompt("Entrez votre email pour réinitialiser votre mot de passe :");
        if (email && email.includes('@')) {
            try {
                await auth.sendPasswordResetEmail(email);
                showToast("Email de réinitialisation envoyé !");
            } catch(e) {
                showToast("Email non trouvé", true);
            }
        } else if (email) {
            showToast("Email invalide", true);
        }
    }
    
    // Renvoyer email vérification
    async function resendVerification() {
        try {
            const user = auth.currentUser;
            if (user) {
                await user.sendEmailVerification();
                showToast("Email de vérification renvoyé !");
            } else {
                showToast("Aucun utilisateur connecté", true);
            }
        } catch(e) {
            showToast("Erreur: " + e.message, true);
        }
    }
    
    // Déconnexion
    async function logout() {
        await auth.signOut();
        showToast("Déconnecté");
        showPage('loginPage');
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
    }
    
    // ==================== ÉTAT AUTHENTIFICATION ====================
    auth.onAuthStateChanged(async (user) => {
        console.log("Auth state changed:", user ? user.email : "null");
        
        if (user && user.emailVerified) {
            showPage('dashboardPage');
            document.getElementById('userEmailDisplay').textContent = user.email;
        } else if (user && !user.emailVerified) {
            document.getElementById('verifyEmailSpan').textContent = user.email;
            showPage('verifyPage');
        } else {
            showPage('loginPage');
        }
    });
    
    // ==================== BOUTONS ====================
    document.getElementById('signinBtn').onclick = login;
    document.getElementById('showRegisterBtn').onclick = () => showPage('registerPage');
    document.getElementById('showLoginBtn').onclick = () => showPage('loginPage');
    document.getElementById('registerBtn').onclick = register;
    document.getElementById('forgotPwdBtn').onclick = resetPassword;
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('resendVerifyBtn').onclick = resendVerification;
    document.getElementById('logoutFromVerifyBtn').onclick = () => { auth.signOut(); showPage('loginPage'); };
    
    console.log("Application chargée - Firebase configuré");
</script>
</body>
</html>
